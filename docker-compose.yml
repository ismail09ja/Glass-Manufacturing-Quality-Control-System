version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: glass_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - glass_network

  backend:
    build: ./backend
    container_name: glass_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/glass-qc
      - JWT_SECRET=glass_qc_secret_key_2024
      - NODE_ENV=development
    depends_on:
      - mongo
    networks:
      - glass_network

  frontend:
    build: ./frontend
    container_name: glass_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - glass_network

networks:
  glass_network:
    driver: bridge

volumes:
  mongo_data:
