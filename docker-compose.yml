version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: glass-qc-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - glass-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glass-qc-backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/glass_qc
      - JWT_SECRET=glass_qc_super_secret_key_2024
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - glass-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: glass-qc-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - glass-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  glass-network:
    driver: bridge
